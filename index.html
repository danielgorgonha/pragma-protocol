<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pragma Protocol — Tokenomics</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #2E75B6;
      --accent2: #58a6ff;
      --text: #c9d1d9;
      --muted: #8b949e;
      --white: #e6edf3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }
    .logo { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: -0.5px; }
    h1 { font-size: 20px; font-weight: 600; color: var(--white); margin-bottom: 8px; }
    p { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 24px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a.dapp-link {
      display: block;
      padding: 14px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: border-color 0.15s;
    }
    a.dapp-link:hover { border-color: var(--accent2); }
    a.dapp-link span { color: var(--muted); font-weight: 400; font-size: 13px; }
    footer { margin-top: 24px; font-size: 12px; color: var(--muted); }
    footer a { color: var(--accent2); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Pragma Protocol</div>
    <h1>Tokenomics — NearX</h1>
    <p>Repositório do curso de Economia Tokenizada. Cada aula adiciona uma camada ao ecossistema (token PGM, modelo BME, casos de uso).</p>
    <div class="links">
      <a class="dapp-link" href="03-axie-autopsy/dapp/index.html">
        Aula 03 — Pragma Access Gate <span>· DApp de gating por saldo PGM (Sepolia)</span>
      </a>
    </div>
  </div>
  <footer>
    <a href="https://github.com/danielgorgonha/pragma-protocol" target="_blank" rel="noopener">GitHub</a>
  </footer>
</body>
</html>
